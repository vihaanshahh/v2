name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: v2-linux-x64
            binary: v2
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: v2-linux-arm64
            binary: v2
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: v2-darwin-x64
            binary: v2
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: v2-darwin-arm64
            binary: v2
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: v2-windows-x64
            binary: v2.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux ARM cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/v2"
          chmod +x package/v2
          tar czf "${{ matrix.artifact }}.tar.gz" -C package v2

      - name: Package windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/v2.exe"
          Compress-Archive -Path package/v2.exe -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > v2-checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/*.zip \
            artifacts/v2-checksums.txt
